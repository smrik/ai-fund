name: Feature request
description: Propose a focused improvement with clear user value and acceptance criteria.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow gap or pain point are you trying to solve.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the smallest useful version of the change.
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints and risks
      description: Relevant technical, product, or workflow constraints.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How we will know this is done.
      placeholder: |
        - [ ] ...
        - [ ] ...
