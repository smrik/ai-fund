site_name: Alpha Pod Docs
site_description: Local wiki for the Alpha Pod research system
repo_url: https://github.com/smrik/ai-fund
repo_name: smrik/ai-fund
docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search

exclude_docs: |
  exec-plans/completed/**

not_in_nav: |
  archive/**
  design-docs/agent-feedback-loop-and-comps-gaps.md
  design-docs/archive/**
  exec-plans/index.md
  plans/2026-03-30-react-ui-parity.md
  plans/active/**
  plans/active/README.md
  plans/archive/**
  plans/completed/**
  plans/future/**
  strategy/**

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true

nav:
  - Home: index.md
  - Valuation:
      - Index: valuation/index.md
      - Company Analysis: valuation/01_company-analysis.md
      - Industry Analysis: valuation/02_industry-analysis.md
      - Historical Financial Analysis: valuation/03_historical-financial-analysis.md
      - Financial Forecasting: valuation/04_financial-forecasting.md
      - DCF Valuation: valuation/05_dcf-valuation.md
      - WACC And Capital Structure: valuation/06_wacc-and-capital-structure.md
      - Terminal Value: valuation/07_terminal-value.md
      - Sensitivity, Scenarios, And Reverse DCF: valuation/08_sensitivity-scenarios-and-reverse-dcf.md
      - Comparable Company Analysis: valuation/09_comps.md
      - QoE And Normalization: valuation/10_qoe-and-normalization.md
      - PM Review Framework: valuation/11_pm-review-framework.md
      - Deterministic Vs LLM Boundary: valuation/12_deterministic-vs-llm-boundary.md
      - PM Valuation Review Checklist: valuation/13_pm-valuation-review-checklist.md
  - Design Docs:
      - Index: design-docs/index.md
      - Architecture Overview: design-docs/architecture-overview.md
      - Core Beliefs: design-docs/core-beliefs.md
      - Hedge Fund Org Mapping: design-docs/hedge-fund-org-mapping.md
      - TickerDossier Contract: design-docs/ticker-dossier-contract.md
      - Deterministic Valuation Flow Spec: design-docs/deterministic-valuation-flow-spec.md
      - Deterministic Valuation Workflow: design-docs/deterministic-valuation-workflow.md
      - Deterministic Valuation Inputs And CIQ Retrieval Spec: design-docs/deterministic-valuation-inputs-and-ciq-retrieval-spec.md
