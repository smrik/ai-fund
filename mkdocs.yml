site_name: Alpha Pod Docs
site_description: Local wiki for the Alpha Pod research system
repo_url: https://github.com/smrik/ai-fund
repo_name: smrik/ai-fund
docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true

nav:
  - Home: index.md
  - Guidance:
      - Repository Guidance: PLANS.md
  - Design Docs:
      - Index: design-docs/index.md
      - Architecture Overview: design-docs/architecture-overview.md
      - Core Beliefs: design-docs/core-beliefs.md
      - Hedge Fund Org Mapping: design-docs/hedge-fund-org-mapping.md
      - Deterministic Valuation Flow Spec: design-docs/deterministic-valuation-flow-spec.md
      - Deterministic Valuation Workflow: design-docs/deterministic-valuation-workflow.md
      - Accounting Recast Agent Spec: design-docs/accounting-recast-agent-spec.md
      - QoE Agent Spec: design-docs/qoe-agent-spec.md
      - Risk Impact Agent Spec: design-docs/risk-impact-agent-spec.md
  - Handbook:
      - Index: handbook/index.md
      - End-to-End Workflow: handbook/workflow-end-to-end.md
      - Finance Deep Dive: handbook/finance-deep-dive.md
      - Valuation And DCF Logic: handbook/valuation-dcf-logic.md
      - Valuation Task Breakdown: handbook/valuation-task-breakdown.md
      - Engineering Deep Dive: handbook/engineering-deep-dive.md
      - Operations Runbook: handbook/operations-runbook.md
      - Quality And Verification: handbook/quality-and-verification.md
      - Deep Dive Dossier: handbook/deep-dive-dossier.md
  - Reference:
      - Config Reference: reference/config-reference.md
      - Valuation Glossary: reference/valuation-glossary.md
      - GitHub Workflow: reference/github-workflow.md
      - Local Wiki Setup: reference/local-wiki.md
  - Strategy:
      - Index: strategy/index.md
      - Product Sense: strategy/product-sense.md
      - Quality Score: strategy/quality-score.md
  - Plans:
      - Index: plans/index.md
      - Future:
          - Dashboard And AI Investing Feature Roadmap: plans/future/2026-03-18-dashboard-ai-investing-feature-roadmap.md
          - XBRL And RAG Chatbot: plans/future/2026-03-15-xbrl-and-rag-chatbot.md
          - Tech Debt Tracker: plans/future/tech-debt-tracker.md
      - Completed:
          - Deep Dive Dashboard Refactor: plans/completed/2026-03-21-deep-dive-dashboard-refactor.md
          - Single-Ticker Deep Dive Dossier System: plans/completed/2026-03-18-single-ticker-deep-dive-dossier.md
          - Dashboard Research Program: plans/completed/2026-03-15-dashboard-research-program.md
          - Dashboard Override Workbench: plans/completed/2026-03-14-dashboard-override-workbench.md
          - DCF Audit And Agent Cache: plans/completed/2026-03-14-dcf-audit-agent-cache.md
  - Archive:
      - Index: archive/index.md
      - Execution Artifact Archive: exec-plans/index.md
