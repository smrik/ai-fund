      - Valuation Methodology Critical Review And Action Plan: design-docs/valuation-methodology-critical-review-and-action-plan.md
      - Accounting Recast Agent Spec: design-docs/accounting-recast-agent-spec.md
      - QoE Agent Spec: design-docs/qoe-agent-spec.md
