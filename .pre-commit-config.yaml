repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check
        language: python
        additional_dependencies:
          - ruff
        types_or:
          - python
          - pyi
      - id: architecture-boundaries
        name: architecture boundary tests
        entry: python -m pytest tests/test_architecture_boundaries.py -q
        language: python
        additional_dependencies:
          - pytest
        pass_filenames: false
